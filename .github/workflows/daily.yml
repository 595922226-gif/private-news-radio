name: Daily Private News Radio

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Download project files
        uses: actions/checkout@v4

      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Prepare Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install required components
        run: pip install -r requirements.txt

      - name: Run daily radio
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHSCOPE_TEXT_MODEL: qwen-plus
          DASHSCOPE_TTS_MODEL: cosyvoice-v3-flash
          DASHSCOPE_TTS_VOICE: longanyang
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/run_daily.py

      - name: Save generated files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-output
          path: |
            output/
            public/
          if-no-files-found: ignore
